kind = "web"
previewPath = "/"
title = "Truekea"
version = "1.0.0"
id = "artifacts/truekea"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19734

[services.development]
run = "pnpm --filter @workspace/truekea run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truekea", "run", "build" ]
publicDir = "artifacts/truekea/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19734"
BASE_PATH = "/"
