openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Truekea Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: Listings
    description: Marketplace listing operations.
  - name: Conversations
    description: Chat conversations between buyers and sellers.
  - name: Messages
    description: Messages within a conversation.
  - name: Stats
    description: Marketplace stats and aggregations.
  - name: Reviews
    description: Seller ratings and reviews.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.

  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.

  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.

  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /listings:
    get:
      tags: [Listings]
      operationId: getListings
      summary: Browse all active listings
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, pending, sold]
      responses:
        '200':
          description: List of listings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listing'
    post:
      tags: [Listings]
      operationId: createListing
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingInput'
      responses:
        '201':
          description: Listing created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /listings/mine:
    get:
      tags: [Listings]
      operationId: getMyListings
      summary: Get the authenticated user's own listings
      responses:
        '200':
          description: User's listings.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Listing'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /listings/{id}:
    get:
      tags: [Listings]
      operationId: getListing
      summary: Get a single listing by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Listing detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingWithSeller'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    patch:
      tags: [Listings]
      operationId: updateListing
      summary: Update a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingUpdate'
      responses:
        '200':
          description: Updated listing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not the seller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Listings]
      operationId: deleteListing
      summary: Delete a listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSuccess'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not the seller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /listings/{id}/status:
    patch:
      tags: [Listings]
      operationId: updateListingStatus
      summary: Change listing status (active, pending, sold)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListingStatusUpdate'
      responses:
        '200':
          description: Listing with updated status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Listing'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Not the seller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /conversations:
    get:
      tags: [Conversations]
      operationId: getConversations
      summary: Get all conversations for the authenticated user
      responses:
        '200':
          description: User's conversations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConversationWithDetails'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /conversations/listing/{listingId}:
    post:
      tags: [Conversations]
      operationId: startOrGetConversation
      summary: Start or get an existing conversation for a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conversation found or created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationWithDetails'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /conversations/{id}/messages:
    get:
      tags: [Messages]
      operationId: getMessages
      summary: Get messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of messages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Messages]
      operationId: sendMessage
      summary: Send a message in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageInput'
      responses:
        '201':
          description: Message sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /stats:
    get:
      tags: [Stats]
      operationId: getMarketplaceStats
      summary: Get marketplace stats (totals by status, recent listings, categories)
      responses:
        '200':
          description: Marketplace stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceStats'

  /reviews:
    post:
      tags: [Reviews]
      operationId: createReview
      summary: Create a review for a seller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInput'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Review already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /reviews/conversation/{conversationId}:
    get:
      tags: [Reviews]
      operationId: getConversationReview
      summary: Get review for a specific conversation (null if none)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Review'
                  - type: 'null'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /reviews/user/{userId}:
    get:
      tags: [Reviews]
      operationId: getSellerReviews
      summary: Get all reviews for a seller
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Seller reviews with stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerReviews'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    DeleteSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    Listing:
      type: object
      required: [id, title, description, price, status, category, photos, sellerId, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        status:
          type: string
          enum: [active, pending, sold]
        category:
          type: string
        photos:
          type: array
          items:
            type: string
        condition:
          type: ["string", "null"]
          enum: [new, like_new, good, fair, null]
        location:
          type: ["string", "null"]
        sellerId:
          type: string
        sellerName:
          type: ["string", "null"]
        sellerAvatar:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ListingWithSeller:
      allOf:
        - $ref: '#/components/schemas/Listing'
      type: object
      properties:
        sellerEmail:
          type: ["string", "null"]

    ListingInput:
      type: object
      required: [title, description, price, category]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        category:
          type: string
          minLength: 1
        photos:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair]
        location:
          type: string

    ListingUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        price:
          type: number
          minimum: 0
        category:
          type: string
        photos:
          type: array
          items:
            type: string
        condition:
          type: string
          enum: [new, like_new, good, fair]
        location:
          type: string

    ListingStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, pending, sold]

    ConversationWithDetails:
      type: object
      required: [id, listingId, buyerId, sellerId, listingTitle, listingPhoto, createdAt]
      properties:
        id:
          type: integer
        listingId:
          type: integer
        buyerId:
          type: string
        sellerId:
          type: string
        listingTitle:
          type: string
        listingPhoto:
          type: ["string", "null"]
        listingPrice:
          type: ["number", "null"]
        listingStatus:
          type: string
        buyerName:
          type: ["string", "null"]
        buyerAvatar:
          type: ["string", "null"]
        sellerName:
          type: ["string", "null"]
        sellerAvatar:
          type: ["string", "null"]
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        unreadCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      required: [id, conversationId, senderId, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: string
        senderName:
          type: ["string", "null"]
        senderAvatar:
          type: ["string", "null"]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    MarketplaceStats:
      type: object
      required: [totalActive, totalPending, totalSold, totalListings, recentListings, categories]
      properties:
        totalActive:
          type: integer
        totalPending:
          type: integer
        totalSold:
          type: integer
        totalListings:
          type: integer
        recentListings:
          type: array
          items:
            $ref: '#/components/schemas/Listing'
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryCount'

    CategoryCount:
      type: object
      required: [category, count]
      properties:
        category:
          type: string
        count:
          type: integer

    Review:
      type: object
      required: [id, conversationId, listingId, reviewerId, reviewedUserId, rating, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        listingId:
          type: integer
        reviewerId:
          type: string
        reviewedUserId:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        listingTitle:
          type: ["string", "null"]
        reviewerName:
          type: ["string", "null"]
        reviewerAvatar:
          type: ["string", "null"]

    ReviewInput:
      type: object
      required: [conversationId, rating]
      properties:
        conversationId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 500

    SellerReviews:
      type: object
      required: [reviews, totalReviews]
      properties:
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        avgRating:
          type: ["number", "null"]
        totalReviews:
          type: integer
